name: Defragment & Cleanup Lists

on:
  schedule:
    - cron: "0 23 * * 0"   # Chủ nhật hàng tuần, 23:00 UTC (~06:00 sáng thứ 2 giờ VN)
  workflow_dispatch:

concurrency:
  group: defragment-lists-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production

jobs:
  defragment:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      # Gom toàn bộ domain còn hiệu lực vào SỐ LIST ÍT NHẤT có thể,
      # sau đó XOÁ các list rỗng còn thừa lại và viết lại rule.
      # => Số lượng list trên Cloudflare luôn khớp chính xác với dữ liệu
      #    thực tế (Dynamic Allocation + Scale Down tự động).
      - name: Defragment lists and delete empty ones
        run: npm run cloudflare-defragment
        env:
          BLOCK_BASED_ON_SNI: ${{ secrets.BLOCK_BASED_ON_SNI }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_TO }}
          FAST_MODE: ${{ vars.FAST_MODE }}

      - name: Thông báo Telegram khi workflow thất bại
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_TO }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Chưa cấu hình TELEGRAM_TOKEN/TELEGRAM_TO, bỏ qua thông báo."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg line1 "🔔 CGPS" \
            --arg line2 "❌ Workflow Defragment & Cleanup Lists thất bại." \
            --arg line3 "Xem log: $RUN_URL" \
            '{chat_id: $chat_id, text: ($line1 + "\n" + $line2 + "\n" + $line3), parse_mode: "HTML"}')
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" > /dev/null
