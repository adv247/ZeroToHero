name: Keepalive & Node Version Update

on:
  schedule:
    - cron: "0 0 * * 0"   # Chủ nhật hàng tuần, 00:00 UTC
  workflow_dispatch:

concurrency:
  group: keepalive-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Giữ cho GitHub không tự vô hiệu hoá (disable) lịch chạy schedule
  # do repo "không hoạt động" (GitHub tự tắt schedule sau 60 ngày KHÔNG CÓ
  # COMMIT nào - chỉ commit mới tính, không phải chỉ chạy workflow).
  #
  # QUAN TRỌNG (đã đổi cách làm): TRƯỚC ĐÂY dùng action bên thứ 3
  # `liskin/gh-workflow-keepalive@v1`. Đã bỏ, vì: hành động tương tự
  # (`gautamkrishnar/keepalive-workflow`) từng bị chính GitHub GỠ KHỎI
  # MARKETPLACE do đội ngũ GitHub cho là vi phạm ToS - dù chính tác giả xác
  # nhận lý do thực sự là "high-burden operations" (bị HÀNG NGHÌN repo dùng
  # cùng lúc gây tải hệ thống), KHÔNG PHẢI vì bản thân việc "commit định kỳ,
  # tần suất thấp, đúng mục đích" là sai. Rủi ro thật ở đây là PHỤ THUỘC vào
  # 1 action bên thứ 3 duy nhất - nếu nó bị gỡ như tiền lệ, keepalive cả hệ
  # thống sẽ ngừng hoạt động mà không ai biết cho tới khi quá muộn (60 ngày).
  #
  # GIẢI PHÁP: tự làm commit "heartbeat" bằng git thuần (không qua action
  # nào cả) - đơn giản, nằm hoàn toàn trong tầm kiểm soát của bạn, tần suất
  # thấp (đúng lịch hàng tuần của workflow này, không phải spam liên tục),
  # đúng mục đích chính đáng (giữ workflow CỦA CHÍNH BẠN hoạt động) - không
  # có rủi ro "high-burden" vì chỉ 1 repo, không phải hàng nghìn repo dùng chung.
  keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Tạo commit heartbeat (không phụ thuộc action bên thứ 3)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/.keepalive
          git config user.name "cgps-bot"
          git config user.email "cgps-bot@users.noreply.github.com"
          git add .github/.keepalive
          if git diff --cached --quiet; then
            echo "Không có gì thay đổi (hiếm khi xảy ra) - bỏ qua commit."
            exit 0
          fi

          # Phương án dự phòng: nếu `git push` thất bại (VD: lỗi mạng thoáng
          # qua, xung đột nhẹ...), TỰ ĐỘNG chuyển sang cách độc lập khác - gọi
          # thẳng GitHub REST API để tạo/cập nhật file (không qua git CLI nữa).
          # Đây là 2 cơ chế HOÀN TOÀN riêng biệt (git protocol vs REST API),
          # nếu 1 trong 2 gặp sự cố tạm thời thì cơ chế còn lại vẫn có khả
          # năng thành công - tăng đáng kể độ tin cậy cho hành động quan trọng
          # này (không có nó, cả hệ thống có thể ngừng chạy sau 60 ngày).
          if git commit -m "chore: keepalive heartbeat $(date -u +%Y-%m-%d)" && git push; then
            echo "✅ Đã tạo commit heartbeat qua git - reset đồng hồ 60 ngày của GitHub."
          else
            echo "⚠️ git push thất bại - chuyển sang phương án dự phòng: GitHub REST API..."
            CONTENT_B64=$(base64 -w0 .github/.keepalive)
            SHA=$(gh api "repos/${{ github.repository }}/contents/.github/.keepalive" --jq .sha 2>/dev/null || echo "")
            if [ -n "$SHA" ]; then
              gh api --method PUT "repos/${{ github.repository }}/contents/.github/.keepalive" \
                -f message="chore: keepalive heartbeat (REST API fallback) $(date -u +%Y-%m-%d)" \
                -f content="$CONTENT_B64" -f sha="$SHA" -f branch="${{ github.ref_name }}"
            else
              gh api --method PUT "repos/${{ github.repository }}/contents/.github/.keepalive" \
                -f message="chore: keepalive heartbeat (REST API fallback) $(date -u +%Y-%m-%d)" \
                -f content="$CONTENT_B64" -f branch="${{ github.ref_name }}"
            fi
            echo "✅ Đã tạo commit heartbeat qua REST API (phương án dự phòng) - reset đồng hồ 60 ngày."
          fi

      # LỚP GIÁM SÁT ĐỘC LẬP CHO CHÍNH KEEPALIVE (Layer 4): PING_URL (dead
      # man's switch qua healthchecks.io hoặc tương tự) trước đây chỉ gắn
      # vào update-filter-lists.yml - nếu CHÍNH job keepalive này ngừng chạy
      # đúng lịch (VD: bị GitHub tự disable, lỗi cấu hình cron...) thì không
      # có gì phát hiện được, vì bản thân workflow này chính là "người canh
      # gác" - không có ai canh gác người canh gác. Dùng secret RIÊNG
      # (PING_URL_KEEPALIVE, khác PING_URL của sync hàng ngày) để tạo 1
      # "check" độc lập trên healthchecks.io, giám sát ĐÚNG lịch hàng tuần
      # của job này - hoàn toàn tách biệt khỏi giám sát sync hàng ngày.
      - name: Ping giám sát riêng cho Keepalive (tuỳ chọn)
        if: ${{ env.PING_URL_KEEPALIVE != '' }}
        env:
          PING_URL_KEEPALIVE: ${{ secrets.PING_URL_KEEPALIVE }}
        run: curl -fsS "$PING_URL_KEEPALIVE" || true

  # Tự động lấy phiên bản Node.js LTS mới nhất, cập nhật .node-version,
  # commit lại, và báo kết quả qua Telegram.
  update-node-version:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read   # Không cần "write" ở cấp job vì dùng token của GitHub App để push
    outputs:
      changed: ${{ steps.node_lts.outputs.changed }}
      version: ${{ steps.node_lts.outputs.version }}
    steps:
      # "Bất tử": sinh 1 Installation Token sống đúng 1 giờ từ GitHub App,
      # thay vì dùng PAT/mật khẩu cố định có ngày hết hạn phải tự gia hạn.
      # Mỗi lần workflow chạy sẽ tự xin 1 token mới - không bao giờ hết hạn
      # vĩnh viễn, không cần con người can thiệp.
      # Cần 2 secrets: APP_ID và APP_PRIVATE_KEY (xem hướng dẫn Bước 1-3 đã
      # thực hiện). Nếu chưa cấu hình GitHub App, tự động fallback về
      # Fine-grained PAT (BOT_PAT_TOKEN) rồi tới GITHUB_TOKEN mặc định.
      # QUAN TRỌNG (giới hạn thật của GitHub Actions): không thể dùng
      # `secrets.X` trực tiếp trong điều kiện `if:` của step - GitHub Actions
      # báo lỗi "Unrecognized named-value: 'secrets'" và cả workflow sẽ
      # KHÔNG chạy được (Invalid workflow file). Cách đúng: gán secret vào
      # `env:` trước, rồi kiểm tra qua `env.X` trong `if:` (vẫn dùng
      # `secrets.APP_ID` bình thường trong `with:` bên dưới - chỉ `if:` bị giới hạn).
      - name: Generate GitHub App token
        id: app_token
        if: ${{ env.APP_ID != '' }}
        env:
          APP_ID: ${{ secrets.APP_ID }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app_token.outputs.token || secrets.BOT_PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Get latest Node.js LTS version
        id: node_lts
        run: |
          set -e
          LATEST_LTS=$(curl -fsS https://nodejs.org/dist/index.json | jq -r '[.[] | select(.lts != false)][0].version' | sed 's/^v//')

          if [ -z "$LATEST_LTS" ] || [ "$LATEST_LTS" = "null" ]; then
            echo "::error::Không lấy được phiên bản LTS từ nodejs.org"
            exit 1
          fi

          CURRENT="$(cat .node-version 2>/dev/null || echo '')"
          echo "Phiên bản LTS mới nhất: $LATEST_LTS (hiện tại: ${CURRENT:-chưa có})"
          echo "$LATEST_LTS" > .node-version

          echo "version=$LATEST_LTS" >> "$GITHUB_OUTPUT"
          if [ "$LATEST_LTS" != "$CURRENT" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # (Tuỳ chọn) Import GPG key để commit được gắn nhãn "Verified" màu xanh.
      # GitHub App token ở trên giải quyết vấn đề "token không hết hạn" và
      # "commit có thể kích hoạt workflow khác" - còn nhãn Verified vẫn cần
      # chữ ký GPG riêng vì git-auto-commit-action dùng git commit thật,
      # không qua GitHub API (chỉ commit tạo qua API mới tự động Verified).
      # Chỉ chạy khi đã thêm 2 secrets: GPG_PRIVATE_KEY và GPG_PASSPHRASE.
      # (Giới hạn thật của GitHub Actions: secrets.X không dùng được trực
      # tiếp trong if: - phải gán qua env: trước, xem lỗi đã sửa ở trên).
      - name: Import GPG key (tuỳ chọn)
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      # Tự kiểm tra .node-version có thay đổi so với repo không.
      # Nếu KHÔNG đổi (đã là bản mới nhất) -> bỏ qua, không tạo commit rác.
      # Nếu CÓ đổi -> commit + push tự động bằng token của GitHub App.
      - name: Commit .node-version if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: cập nhật .node-version lên bản LTS mới nhất (${{ steps.node_lts.outputs.version }})"
          file_pattern: .node-version
          commit_user_name: ${{ steps.app_token.outputs.app-slug && format('{0}[bot]', steps.app_token.outputs.app-slug) || 'cgps-bot' }}
          commit_user_email: ${{ steps.app_token.outputs.app-slug && format('{0}[bot]@users.noreply.github.com', steps.app_token.outputs.app-slug) || 'cgps-bot@users.noreply.github.com' }}

      - name: Thông báo Telegram - cập nhật thành công
        if: ${{ steps.node_lts.outputs.changed == 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_TO }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Chưa cấu hình TELEGRAM_TOKEN/TELEGRAM_TO, bỏ qua thông báo."
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg line1 "🔔 CGPS" \
            --arg line2 "✅ Đã cập nhật .node-version lên bản LTS mới nhất: ${{ steps.node_lts.outputs.version }}" \
            '{chat_id: $chat_id, text: ($line1 + "\n" + $line2), parse_mode: "HTML"}')
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" > /dev/null

  # Job riêng, luôn chạy sau cùng, chỉ để gửi cảnh báo Telegram nếu BẤT KỲ
  # job nào ở trên thất bại (kể cả lỗi hạ tầng, không phụ thuộc code Node.js).
  notify-on-failure:
    needs: [keepalive, update-node-version]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Job này chỉ gửi 1 request curl, không cần bất kỳ quyền nào với repo.
    permissions: {}
    steps:
      - name: Thông báo Telegram - lỗi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_TO }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Chưa cấu hình TELEGRAM_TOKEN/TELEGRAM_TO, bỏ qua thông báo."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg line1 "🔔 CGPS" \
            --arg line2 "❌ Workflow Keepalive & Node Version Update thất bại." \
            --arg line3 "Xem log: $RUN_URL" \
            '{chat_id: $chat_id, text: ($line1 + "\n" + $line2 + "\n" + $line3), parse_mode: "HTML"}')
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" > /dev/null
